server:
  port: 8083

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/inventory_db
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true

inventory:
  service:
    low-stock-threshold: 10
    auto-reorder: true
    reorder-quantity: 100