server:
  port: 8888

spring:
  profiles:
    active: native
  cloud:
    config:
      server:
        native:
          search-locations: classpath:/configs
  application:
    name: config-server

  # Config Server Configuration
#  cloud:
#    config:
#      server:
#        git:
#          # Using local file system for now (easier for learning)
#          # Later you can change to Git repository
#          uri: file:///${user.home}/config-repo
#          clone-on-start: true
#          default-label: main

        # Alternative: Use native file system (easier for beginners)
        # native:
        #   search-locations: classpath:/configs, file:./configs

  # Basic Security
  security:
    user:
      name: config-user
      password: config-pass

# Eureka Configuration
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    hostname: localhost
    prefer-ip-address: true

# Actuator Endpoints
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

# Logging
logging:
  level:
    root: INFO
    org.springframework.cloud.config: DEBUG